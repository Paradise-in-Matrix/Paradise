name: Release and Publish
on:
  push:
    branches:
      - master
    paths:
      - package.json
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "PKG_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Verify Version Bump
        run: |
          if git rev-parse "v${{ env.PKG_VERSION }}" >/dev/null 2>&1; then
            exit 1
          fi

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ env.PKG_VERSION }}"
          git push origin "v${{ env.PKG_VERSION }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Build Frontend and Electron
        run: |
          npm i
          npm run release
          echo '#!/bin/sh' > wrapper.sh
          echo 'exec /app/main/paradise "$@"' >> wrapper.sh
          chmod +x wrapper.sh
          chmod +x scripts/electron.sh
          ./scripts/electron.sh

      - name: Build Flatpak Bundle
        run: |
          flatpak-builder --repo=repo --force-clean build-dir electron/com.gigiaj.paradise.yml
          flatpak build-bundle repo paradise-${{ env.PKG_VERSION }}.flatpak com.gigiaj.paradise

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.PKG_VERSION }}"
          name: "Release v${{ env.PKG_VERSION }}"
          generate_release_notes: true
          files: |
            paradise-${{ env.PKG_VERSION }}.flatpak
            electron/dist/*.AppImage

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:${{ env.PKG_VERSION }}
            ghcr.io/${{ env.REPO_LC }}:latest
